name: PHP CI

on:
  - push

jobs:
    build:
            runs-on: ununtu-latest

            steps:
              - uses: actions/checkout@v2
              - name: PHP
                with:
                              php-version: '8.0.11'
              - name: lint
                run : make lint     
              - name: test
                run : make test
              - name: fix
                run : make fix         
            
